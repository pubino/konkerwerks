version: '3.8'

services:
  unit-tests:
    build: .
    container_name: concur-unit-tests
    # Runs the unit tests with mocks (no internet / API keys required)

  integration-tester:
    build: .
    container_name: concur-integration-tester
    entrypoint: ["python", "-m", "ccworks.cli"]
    # Mounts .env file from host to inject actual SAP Concur credentials
    volumes:
      - ./.env:/app/.env

  allocation-test:
    build: .
    container_name: concur-allocation-test
    # Runs the specific allocation CRUD tests
    command: ["python", "tests/test_allocations_crud.py"]
    volumes:
      - ./concur_session.json:/app/concur_session.json
      - ./screenshots:/app/screenshots
