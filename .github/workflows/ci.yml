name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run unit tests
      run: |
        # Only run the pure unit test to avoid Playwright dependency issues
        python -m unittest tests/test_client.py

  docker-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up docker-compose compatibility symlink
      run: |
        if ! command -v docker-compose &> /dev/null; then
          sudo ln -s /usr/libexec/docker/cli-plugins/docker-compose /usr/local/bin/docker-compose
        fi

    - name: Build and run tests via Docker Compose
      run: |
        docker-compose build unit-tests
        docker-compose run --rm unit-tests

  browser-smoke-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Install Playwright Chromium with OS Dependencies
      env:
        CCWORKS_SKIP_BROWSER_BOOTSTRAP: "1"
      run: |
        python -m playwright install chromium --with-deps

    - name: Run Playwright browser smoke tests
      env:
        # Skip the runtime chromium bootstrap — we just installed it above.
        CCWORKS_SKIP_BROWSER_BOOTSTRAP: "1"
      run: |
        python tests/test_browser_smoke.py
        python tests/test_transaction_fields_crud.py
        python tests/test_justification.py

  package-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build sdist + wheel
      run: |
        python -m pip install --upgrade pip build
        python -m build

    - name: Sanity-check installability from sdist
      run: |
        python -m venv /tmp/vv
        /tmp/vv/bin/pip install --upgrade pip
        /tmp/vv/bin/pip install dist/*.tar.gz
        # argparse-driven CLI: `ccworks` with no args exits non-zero and
        # prints its usage. We just need proof the entry point is wired.
        /tmp/vv/bin/ccworks 2>&1 | grep -qi "usage:" || { echo "ccworks entry point did not print usage"; exit 1; }
